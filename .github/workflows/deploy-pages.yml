name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"
    - cron: "35 3 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Last Known-Good Pages Data
        uses: actions/cache@v4
        with:
          path: docs/data
          key: thinkstock-pages-data-v1-${{ github.run_id }}
          restore-keys: |
            thinkstock-pages-data-v1-

      - name: Snapshot Data Baseline
        run: cp -a docs/data .pages-data-baseline

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate Web App
        run: npm test

      - name: Install WebKit Test Dependencies
        if: github.event_name != 'schedule'
        run: |
          npm ci
          npx playwright install --with-deps webkit

      - name: Test Desktop WebKit Interactions
        if: github.event_name != 'schedule'
        run: npm run test:webkit:desktop

      - name: Install Data Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests

      - name: Test Data Regression Guard
        run: python -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Build Pages Data
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOFIA_API_KEY: ${{ secrets.KOFIA_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_DISCLOSURE_STOCK_CODES: ${{ vars.DART_DISCLOSURE_STOCK_CODES }}
          ENABLE_FREESIS_CREDIT_TAIL: "1"
          PAGES_FULL_REBUILD: ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '35 3 * * 0') && '1' || '0' }}
        run: python scripts/build_pages_data.py

      - name: Publish Data Build Health
        if: always()
        run: python scripts/summarize_build_report.py >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Pages Data
        env:
          KOFIA_API_KEY: ${{ secrets.KOFIA_API_KEY }}
          ENABLE_FREESIS_CREDIT_TAIL: "1"
          PAGES_STRICT_FRESHNESS: "1"
        run: python scripts/validate_pages_data.py

      - name: Reject Data Regression
        run: python scripts/check_pages_data_regression.py --baseline .pages-data-baseline --current docs/data

      - name: Stamp Pages Asset Version
        run: python scripts/stamp_pages_assets.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
