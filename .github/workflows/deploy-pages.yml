name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"
    - cron: "35 3 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: Validate Web App
        run: npm test

      - name: Cache WebKit Browser
        if: github.event_name != 'schedule' || github.event.schedule == '35 3 * * 0'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install WebKit Test Dependencies
        if: github.event_name != 'schedule' || github.event.schedule == '35 3 * * 0'
        run: npx playwright install --with-deps webkit

      - name: Test Safari and iPhone WebKit Interactions
        if: github.event_name != 'schedule' || github.event.schedule == '35 3 * * 0'
        run: npm run test:webkit

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Plotly Vendor Bundle
        run: npm run vendor:sync

      - name: Build Optimized Web Bundle
        run: npm run build:web

      - name: Restore Last Known-Good Pages Data
        uses: actions/cache@v5
        with:
          path: docs/data
          key: thinkstock-pages-data-v1-${{ github.run_id }}
          restore-keys: |
            thinkstock-pages-data-v1-

      - name: Snapshot Data Baseline
        run: cp -a docs/data .pages-data-baseline

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-pages.txt

      - name: Install Data Build Dependencies
        run: python -m pip install --disable-pip-version-check --requirement requirements-pages.txt

      - name: Test Data Regression Guard
        run: python -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Build Pages Data
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KOFIA_API_KEY: ${{ secrets.KOFIA_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ENABLE_FREESIS_CREDIT_TAIL: "1"
          PAGES_FULL_REBUILD: ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '35 3 * * 0') && '1' || '0' }}
        run: python scripts/build_pages_data.py

      - name: Publish Data Build Health
        if: always()
        run: python scripts/summarize_build_report.py >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Pages Data
        env:
          KOFIA_API_KEY: ${{ secrets.KOFIA_API_KEY }}
          ENABLE_FREESIS_CREDIT_TAIL: "1"
          PAGES_STRICT_FRESHNESS: "1"
        run: python scripts/validate_pages_data.py

      - name: Reject Data Regression
        run: python scripts/check_pages_data_regression.py --baseline .pages-data-baseline --current docs/data

      - name: Stamp Pages Asset Version
        run: python scripts/stamp_pages_assets.py

      - name: Prepare Slim Pages Artifact
        run: python scripts/prepare_pages_artifact.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./.pages-artifact

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - validate-web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
