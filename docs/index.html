<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#173022">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>ThinkStock</h1>
      </header>
      <div class="range-row">
        <button class="range-btn is-active" data-years="10">10년</button>
        <button class="range-btn" data-years="20">20년</button>
        <button class="range-btn" data-years="30">30년</button>
      </div>
      <div id="chart" class="chart-frame"></div>
      <div id="messageArea" class="message-area"></div>
    </div>
  </body>
</html>
