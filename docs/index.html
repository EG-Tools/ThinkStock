<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-title-row">
          <h1>ThinkStock</h1>
          <div class="stock-add-panel stock-add-panel-inline" id="stockAddPanel">
            <div class="stock-search-wrap">
              <input id="stockSearchInput" class="stock-search-input" type="text" autocomplete="off" spellcheck="false" placeholder="&#xC885;&#xBAA9;&#xCD94;&#xAC00;">
              <div id="stockSuggestList" class="stock-suggest-list" hidden></div>
            </div>
          </div>
        </div>
        <div class="top-controls">
          <button id="hoverToggle" class="hover-toggle-btn" title="지수팝업 ON/OFF">지수팝업</button>
          <label class="credit-offset-wrap" title="신용잔고 발표 시차 보정(일)">
            <span class="credit-offset-label">신용옵셋</span>
            <input id="creditOffset" class="credit-offset-input" type="number" value="-2" step="1" min="-30" max="30">
          </label>
          <button id="resetHandles" class="reset-btn">리셋</button>
          <button id="refreshData" class="refresh-btn" title="새로고침">&#x21BB;</button>
          <button id="apiOptionsBtn" class="icon-btn" title="API 설정" aria-label="API 설정">⚙</button>
        </div>
                <div class="series-toggle-board" id="seriesToggleBoard">
          <div class="series-row base-row">
            <button class="series-toggle-btn" data-series="leading_cycle">선행지수 순환변동치</button>
            <button class="series-toggle-btn" data-series="^KS11">코스피</button>
            <button class="series-toggle-btn" data-series="^KQ11">코스닥</button>
          </div>
          <div class="series-row base-row">
            <button class="series-toggle-btn" data-series="kospi_credit">코스피 신용</button>
            <button class="series-toggle-btn" data-series="kosdaq_credit">코스닥 신용</button>
          </div>
          <div class="series-row custom-series-row" id="customStockButtons"></div>
        </div>
      </header>
      <div id="chart" class="chart-frame"></div>
      <div id="chart-adr" class="chart-frame chart-frame-adr"></div>
      <div class="range-row">
        <button class="range-btn" data-months="1">1M</button>
        <button class="range-btn" data-months="3">3M</button>
        <button class="range-btn" data-months="6">6M</button>
        <button class="range-btn" data-months="12">1Y</button>
        <button class="range-btn" data-months="36">3Y</button>
        <button class="range-btn" data-months="60">5Y</button>
        <button class="range-btn is-active" data-months="120">10Y</button>
        <button class="range-btn" data-months="180">15Y</button>
        <button class="range-btn" data-months="240">20Y</button>
        <button class="range-btn" data-months="360">30Y</button>
        <a class="adr-source-link" href="http://www.adrinfo.kr/chart" target="_blank" rel="noopener">ADR 출처: adrinfo.kr</a>
      </div>
      <div id="messageArea" class="message-area"></div>
    </div>

    <div id="apiSettingsModal" class="api-settings-modal" hidden>
      <div class="api-settings-backdrop" data-api-close="1"></div>
      <section class="api-settings-panel" role="dialog" aria-modal="true" aria-labelledby="apiSettingsTitle">
        <header class="api-settings-header">
          <h2 id="apiSettingsTitle">API 설정</h2>
          <button id="apiSettingsCloseBtn" class="api-close-btn" type="button" aria-label="닫기">✕</button>
        </header>
        <p class="api-settings-help">입력한 키는 이 기기 브라우저(LocalStorage)에만 저장됩니다.</p>
        <label class="api-field">
          <span>ECOS (한국은행)</span>
          <input id="ecosApiInput" type="password" autocomplete="off" spellcheck="false" placeholder="선행지수 순환변동치">
        </label>
        <label class="api-field">
          <span>KOFIA (금융투자협회)</span>
          <input id="kofiaApiInput" type="password" autocomplete="off" spellcheck="false" placeholder="신용잔고">
        </label>
        <label class="api-field">
          <span>KOSIS (국가통계포털)</span>
          <input id="kosisApiInput" type="password" autocomplete="off" spellcheck="false" placeholder="선행지수 보조">
        </label>
        <label class="api-field">
          <span>KRX AUTH_KEY (예비)</span>
          <input id="krxApiInput" type="password" autocomplete="off" spellcheck="false" placeholder="저장만 수행">
        </label>
        <p class="api-settings-note">새로고침 버튼을 누르면 저장된 키로 최신 데이터를 불러옵니다.</p>
        <div class="api-settings-actions">
          <button id="apiSettingsSaveBtn" class="api-action-btn primary" type="button">저장</button>
          <button id="apiSettingsClearBtn" class="api-action-btn" type="button">전체 삭제</button>
        </div>
      </section>
    </div>
  </body>
</html>
