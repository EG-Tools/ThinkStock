<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Think Stock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./assets/app.bundle.min.js?v=dev"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-title-row">
          <h1>Think Stock</h1>
          <div class="stock-add-panel stock-add-panel-inline" id="stockAddPanel">
            <div class="stock-search-wrap">
              <input id="stockSearchInput" class="stock-search-input" type="text" autocomplete="off" spellcheck="false" placeholder="종목추가">
              <div id="stockSuggestList" class="stock-suggest-list" hidden></div>
            </div>
          </div>
        </div>
        <div class="top-controls">
          <button id="hoverToggle" class="hover-toggle-btn" title="지수팝업 ON/OFF">지수팝업</button>
          <button id="disclosureToggle" class="hover-toggle-btn disclosure-toggle-btn" title="공시 마커 ON/OFF">공시</button>
          <label class="credit-offset-wrap" title="예탁금·신용 발표 시차 보정(일)">
            <span class="credit-offset-label">자금옵셋</span>
            <input id="creditOffset" class="credit-offset-input" type="number" value="-2" step="1" min="-30" max="30">
          </label>
          <button id="resetHandles" class="reset-btn">리셋</button>
          <button id="refreshData" class="refresh-btn" title="새로고침">&#x21BB;</button>
          <button id="apiOptionsBtn" class="icon-btn" title="API 설정" aria-label="API 설정">⚙</button>
        </div>
        <div class="series-toggle-board" id="seriesToggleBoard">
          <div class="series-row base-row">
            <button class="series-toggle-btn" data-series="leading_cycle">선행순환변동</button>
            <button class="series-toggle-btn" data-series="^KS11">코스피</button>
            <button class="series-toggle-btn" data-series="^KQ11">코스닥</button>
          </div>
          <div class="series-row base-row">
            <button class="series-toggle-btn" data-series="customer_deposit">고객예탁금</button>
            <button class="series-toggle-btn" data-series="kospi_credit">코스피신용</button>
            <button class="series-toggle-btn" data-series="kosdaq_credit">코스닥신용</button>
          </div>
          <div class="series-row custom-series-row" id="customStockButtons"></div>
        </div>
      </header>
      <div id="chart" class="chart-frame"></div>
      <div id="chart-adr" class="chart-frame chart-frame-adr"></div>
      <div class="range-row">
        <button class="range-btn" data-months="1">1M</button>
        <button class="range-btn" data-months="3">3M</button>
        <button class="range-btn" data-months="6">6M</button>
        <button class="range-btn" data-months="12">1Y</button>
        <button class="range-btn" data-months="36">3Y</button>
        <button class="range-btn" data-months="60">5Y</button>
        <button class="range-btn is-active" data-months="120">10Y</button>
        <button class="range-btn" data-months="180">15Y</button>
        <button class="range-btn" data-months="240">20Y</button>
        <button class="range-btn" data-months="360">30Y</button>
        <a class="adr-source-link" href="http://www.adrinfo.kr/chart" target="_blank" rel="noopener">ADR 출처: adrinfo.kr</a>
        <a class="adr-source-link fear-greed-source-link" href="https://kospi.feargreedchart.com/" target="_blank" rel="noopener">공포탐욕 출처</a>
      </div>
      <div id="dataFreshness" class="data-freshness" aria-live="polite"></div>
      <div id="messageArea" class="message-area"></div>
    </div>

    <div id="apiSettingsModal" class="api-settings-modal" hidden>
      <div class="api-settings-backdrop" data-api-close="1"></div>
      <section class="api-settings-panel" role="dialog" aria-modal="true" aria-labelledby="apiSettingsTitle">
        <header class="api-settings-header">
          <h2 id="apiSettingsTitle">API 설정</h2>
          <button id="apiSettingsCloseBtn" class="api-close-btn" type="button" aria-label="닫기">×</button>
        </header>
        <p class="api-settings-help">ECOS·KOSIS·KOFIA·KRX·DART 데이터는 GitHub Actions가 서버에서 갱신합니다.</p>
        <p class="api-settings-note">API 키는 브라우저에 저장하거나 외부 공개 프록시로 보내지 않습니다. 종목 목록과 최근 주요 공시는 예약 빌드 후 자동 반영됩니다.</p>
        <div class="api-settings-actions">
          <button id="performanceDiagnosticsBtn" class="api-action-btn" type="button">앱 상태 보기</button>
          <button id="dataCacheClearBtn" class="api-action-btn" type="button">마지막 화면 초기화</button>
        </div>
        <section id="performanceDiagnosticsPanel" class="performance-diagnostics" hidden>
          <div class="performance-diagnostics-header">
            <strong>성능 및 저장공간</strong>
            <button id="performanceDiagnosticsRefreshBtn" class="api-action-btn" type="button">다시 측정</button>
          </div>
          <p id="performanceDiagnosticsSummary" class="performance-diagnostics-summary" aria-live="polite"></p>
          <button id="performanceDiagnosticsClearBtn" class="diagnostics-clear-btn" type="button">이전 기록 지우기</button>
        </section>
        <p class="api-settings-meta">
          Version : <span id="appVersionText">1.00</span><br>
          회사명 : Life User<br>
          이메일 : <a href="mailto:Lyrikey@Naver.com">Lyrikey@Naver.com</a>
        </p>
      </section>
    </div>
  </body>
</html>
