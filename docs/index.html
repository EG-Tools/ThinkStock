<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-row">
          <h1>ThinkStock</h1>
          <button id="refreshData" class="refresh-btn" title="데이터 새로고침">&#x21BB;</button>
          <label class="credit-offset-wrap" title="신용잔고 발표 시차 보정 (일)">
            <span class="credit-offset-label">신용 오프셋</span>
            <input id="creditOffset" class="credit-offset-input" type="number" value="-2" step="1" min="-10" max="0">
          </label>
        </div>
      </header>
      <div id="chart" class="chart-frame"></div>
      <div id="chart-adr" class="chart-frame chart-frame-adr"></div>
      <div class="help-row">
        <span class="help-text">왼쪽 원은 위치, 오른쪽 원은 스케일입니다. 두 핸들을 함께 움직이면 원하는 모양으로 정렬할 수 있습니다.</span>
        <button id="resetHandles" class="reset-btn">리셋</button>
      </div>
      <div class="range-row">
        <button class="range-btn" data-months="1">1M</button>
        <button class="range-btn" data-months="3">3M</button>
        <button class="range-btn" data-months="6">6M</button>
        <button class="range-btn" data-months="12">1Y</button>
        <button class="range-btn" data-months="36">3Y</button>
        <button class="range-btn" data-months="60">5Y</button>
        <button class="range-btn is-active" data-months="120">10Y</button>
        <button class="range-btn" data-months="180">15Y</button>
        <button class="range-btn" data-months="240">20Y</button>
        <button class="range-btn" data-months="360">30Y</button>
      </div>
      <div id="messageArea" class="message-area"></div>
    </div>
  </body>
</html>
