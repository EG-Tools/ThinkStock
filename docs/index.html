<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#05070b">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Mobile Overlay Dashboard</p>
        <h1>ThinkStock</h1>
        <p class="hero-copy">토글은 유지한 채 기간만 바꾸고, 왼쪽 컬러 원을 드래그해 시리즈 높이를 직접 정렬할 수 있습니다.</p>
      </header>

      <section class="control-card">
        <div class="control-row">
          <div class="range-row">
            <button class="range-btn is-active" type="button" data-years="10">10년</button>
            <button class="range-btn" type="button" data-years="20">20년</button>
            <button class="range-btn" type="button" data-years="30">30년</button>
          </div>
          <div id="rangeStatus" class="range-status"></div>
        </div>
        <div id="seriesToggles" class="series-toggles"></div>
      </section>

      <section class="chart-shell">
        <div class="chart-hint">왼쪽 원을 위아래로 끌면 해당 차트만 함께 이동합니다.</div>
        <div class="plot-shell">
          <div id="axisRail" class="axis-rail" aria-label="시리즈 위치 조절"></div>
          <div id="chart" class="chart-frame"></div>
        </div>
      </section>

      <div id="messageArea" class="message-area"></div>
    </div>
  </body>
</html>
