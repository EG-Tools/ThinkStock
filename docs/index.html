<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#05070b">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Mobile Overlay Dashboard</p>
        <h1>ThinkStock</h1>
        <p class="hero-copy">선행지수 순환변동치를 맨 앞에 두고, 왼쪽 원으로 위치를, 오른쪽 원으로 스케일을 조절할 수 있습니다.</p>
      </header>

      <section class="control-card">
        <div class="control-row">
          <div class="range-row">
            <button class="range-btn is-active" type="button" data-years="10">10년</button>
            <button class="range-btn" type="button" data-years="20">20년</button>
            <button class="range-btn" type="button" data-years="30">30년</button>
          </div>
          <div id="rangeStatus" class="range-status"></div>
        </div>
        <div id="seriesToggles" class="series-toggles"></div>
      </section>

      <section class="chart-shell">
        <div class="chart-hint">왼쪽 원은 위치, 오른쪽 원은 스케일입니다. 두 핸들을 함께 움직이면 원하는 모양으로 정렬할 수 있습니다.</div>
        <div class="plot-shell">
          <div id="leftRail" class="axis-rail axis-rail-left" aria-label="시리즈 위치 조절"></div>
          <div id="chart" class="chart-frame"></div>
          <div id="rightRail" class="axis-rail axis-rail-right" aria-label="시리즈 스케일 조절"></div>
        </div>
      </section>

      <div id="messageArea" class="message-area"></div>
    </div>
  </body>
</html>
