<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#05070b">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>ThinkStock</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>ThinkStock</h1>
        <p class="hero-copy">선행지수, 신용잔고, 코스피·코스닥, 개별 종목을 한 화면에서 비교하는 모바일 오버레이 차트입니다.</p>
      </header>

      <div id="chart" class="chart-frame"></div>

      <div class="help-row">
        <span class="help-text">왼쪽 원은 위치, 오른쪽 원은 스케일입니다. 두 핸들을 함께 움직이면 원하는 모양으로 정렬할 수 있고, 범례를 눌러 시리즈를 켜고 끌 수 있습니다.</span>
        <button id="resetHandles" class="reset-btn" type="button">리셋</button>
      </div>

      <div class="range-row">
        <button class="range-btn" data-years="1" type="button">1Y</button>
        <button class="range-btn" data-years="5" type="button">5Y</button>
        <button class="range-btn is-active" data-years="10" type="button">10Y</button>
        <button class="range-btn" data-years="20" type="button">20Y</button>
        <button class="range-btn" data-years="30" type="button">30Y</button>
      </div>

      <div id="messageArea" class="message-area"></div>
    </div>
  </body>
</html>
